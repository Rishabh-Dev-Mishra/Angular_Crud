<app-navbar></app-navbar>

<div class="admin-page-wrapper">
    <a routerLink="/home" class="back-btn">
    <span class="label" (click)="goBack()">Back</span>
  </a>
    <div class="glass-form-card">
        <h1 class="main-title">Add New Brand</h1>
        <p class="subtitle">Expand the luxury collection</p>
        
        <form #brandform="ngForm" (ngSubmit)="update(brandform)" class="premium-form">
            <div class="input-group">
                <label for="logo">Brand Logo / Photo</label>
                <div class="file-input-wrapper">
                    <input type="file" #fileInput (change)="onFileSelected($event)" name="logo" id="logo" accept="image/*">
                </div>
            </div>

            <div class="input-group">
                <label for="brandName">Official Name</label>
                <input type="text" name="brandName" ngModel id="brandName" placeholder="e.g. Aston Martin">
            </div>

            <button type="submit" (click)="disableButton()" [disabled] = "brandform.invalid || !showmssg" class="submit-btn">
                <span>Save Brand</span>
            </button>
        </form>
    </div>
</div>

<app-footer></app-footer>
