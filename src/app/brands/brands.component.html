<app-navbar></app-navbar>
<main class="brands-container">
  <a routerLink="/home" class="back-btn">
    <span class="icon">←</span>
    <span class="label">Home</span>
  </a>
  <header class="brands-header">
    <span class="eyebrow">Select Your Heritage</span>
    <h1>World-Class <span class="text-gradient">Manufacturers</span></h1>
    <div class="search-wrapper">
      <!-- <i class="fa fa-search"></i> -->
      <input
        type="text"
        placeholder="Search brands (e.g. Porsche, Ferrari...)"
      />
    </div>
  </header>

  <div class="empty" *ngIf="brandList.length == 0; else has">
    No Brands Found!!
  </div>
  <ng-template #has>
    <div class="brands-grid" >
      <ul>
        <li *ngFor="let brand of brandList">
          <a [routerLink]="['/cars',brand.brand_id, brand.brand_name]" class="brand-card">
            <div class="brand-logo">
              <img
                [src]="'http://localhost:3000/uploads/' + brand.brand_logo"
                alt="{{ brand.brand_name }} logo"
              />
            </div>
            <div class="brand-info">
              <h3>{{ brand.brand_name }}</h3>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </ng-template>
</main>

<app-footer></app-footer>
