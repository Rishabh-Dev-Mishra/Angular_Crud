  </a>

      <div class="brand-info">
        <h3>Ferrari</h3>
        <p>8 Models Available</p>
      </div>
      <div class="card-arrow">→</div>

    <a routerLink="/cars/lamborghini" class="brand-card">
      <div class="brand-logo">
        <img src="https://www.car-logos.org/wp-content/uploads/2011/09/lamborghini.png" alt="Lamborghini">

      <div class="brand-info">
