<app-navbar></app-navbar>

<main class="brands-container">
  <a (click)="goBack()" class="back-btn">
    <span class="icon">←</span>
    <span class="label">Back</span>
  </a>

  <header class="brands-header">
    <span class="eyebrow">Select Your Heritage</span>
    <h1>World-Class <span class="text-gradient">Manufacturers</span></h1>
    <div class="search-wrapper">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="filterBrands()"
        placeholder="Search brands (e.g. Porsche, Ferrari...)"
      />
      <i class="fas fa-arrow-right" (click)="filterBrands()"></i>
    </div>
  </header>

  <div class="brands-grid-wrapper" *ngIf="filteredBrands.length > 0; else noBrands">
    <div class="brands-grid">
      <ul>
        <li *ngFor="let brand of filteredBrands">
          <a [routerLink]="['/cars', brand.brand_id, brand.brand_name, user_id]" class="brand-card">
            <div class="brand-logo">
              <img
                [src]="backendUrl+'/uploads/' + brand.brand_logo"
                alt="{{ brand.brand_name }} logo"
              />
            </div>
            <div class="brand-info">
              <h3>{{ brand.brand_name }}</h3>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <ng-template #noBrands>
    <div class="empty-state">
      <p>No Brands Found!!</p>
    </div>
  </ng-template>
</main>

<app-footer></app-footer>
