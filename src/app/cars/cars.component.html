<app-navbar></app-navbar>
<main class="showroom-container">
  <a routerLink="/brands" class="back-btn">
    <span class="arrow">←</span> 
    <span class="btn-text">Back to Brands</span>
  </a>

  <header class="showroom-header">
    <h1 class="brand-title">Porsche <span class="count">(12)</span></h1>
    <div class="filter-pills">
      <button class="pill active">All Models</button>
      <button class="pill">Electric</button>
      <button class="pill">Sports</button>
      <button class="pill">SUV</button>
    </div>
  </header>

  <div class="showroom-layout">
    <aside class="filter-sidebar">
      <div class="filter-group">
        <h4>Year</h4>
        <label><input type="checkbox"> 2024 - New</label>
        <label><input type="checkbox"> 2022 - 2023</label>
      </div>
      <div class="filter-group">
        <h4>Transmission</h4>
        <label><input type="radio" name="trans"> Automatic</label>
        <label><input type="radio" name="trans"> Manual</label>
      </div>
      <div class="promo-box">
        <p>Looking for a custom build?</p>
        <button class="minimal-btn">Inquire Now</button>
      </div>
    </aside>

    <section class="car-list">
      <div class="car-item">
        <div class="car-thumb">
          <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=800" alt="Car">
          <span class="tag">In Stock</span>
        </div>
        <div class="car-details">
          <div class="detail-top">
            <h3>911 Carrera S</h3>
            <p class="price">$131,300</p>
          </div>
          <div class="specs">
            <span><i class="fa fa-tachometer"></i> 3.4s (0-60)</span>
            <span><i class="fa fa-bolt"></i> 443 HP</span>
          </div>
          <button class="view-btn">Configure</button>
        </div>
      </div>

      <div class="car-item">
        <div class="car-thumb">
          <img src="https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?q=80&w=800" alt="Car">
        </div>
        <div class="car-details">
          <div class="detail-top">
            <h3>718 Cayman GT4</h3>
            <p class="price">$106,500</p>
          </div>
          <div class="specs">
            <span><i class="fa fa-tachometer"></i> 4.2s (0-60)</span>
            <span><i class="fa fa-bolt"></i> 414 HP</span>
          </div>
          <button class="view-btn">Configure</button>
        </div>
      </div>
    </section>
  </div>
</main>

<app-footer></app-footer>
