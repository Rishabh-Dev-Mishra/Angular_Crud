<button (click)="goBack()" class="btn-back">Back</button>

<div *ngIf="convers && convers.length > 0; else noConversations">
  <ng-container *ngFor="let conv of convers">
    <div class="conversation-card" *ngIf="conv.buyer_id != currentUserId">
      
      <!-- Avatar -->
      <div class="avatar">
        {{ conv.firstname[0] }}
      </div>

      <!-- Info -->
      <div class="info">
        <h4>Buyer Name: {{ conv.firstname }}</h4>
      </div>

      <!-- Action -->
      <button class="chat-btn" (click)="openChat(conv)">Chat</button>
    </div>
    
  </ng-container>
</div>

<!-- Empty State -->
<ng-template #noConversations>
  <div class="no-conversations">
    No conversations found.
  </div>
</ng-template>
