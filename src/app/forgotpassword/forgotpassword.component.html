<div class="auth-container">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <form #resetForm="ngForm" (ngSubmit)="onSubmit(resetForm)">

      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" [(ngModel)]="formData.password" 
               required minlength="8" 
               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
               #pwRef="ngModel">
        <div class="error-msg" *ngIf="pwRef.invalid && pwRef.touched">
          Must be 8+ chars with Upper, Lower, Number, and Special char.
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="formData.confirmPassword" 
               required #confirmRef="ngModel">
        <span class="error-msg" *ngIf="confirmRef.touched && formData.password !== formData.confirmPassword">
          Passwords do not match.
        </span>
      </div>

      <button type="submit" [disabled]="resetForm.invalid || formData.password !== formData.confirmPassword">
        Update Password
      </button>
    </form>
  </div>
</div>
