<main class="content-wrapper">
  <section class="hero-section">
    <div class="hero-content">
      <span class="subtitle">Exclusivity Redefined</span>
      <h1>
        Precision Performance. <br />
        <span class="text-gradient">Pure Luxury.</span>
      </h1>
      <p>
        Experience the world's most prestigious automotive collection. From
        track-ready supercars to handcrafted grand tourers.
      </p>
      <div class="cta-group">
        <button class="btn-primary" (click)="goToInven()">
          Explore Inventory
        </button>
        <button class="btn-secondary">Book a Viewing</button>
      </div>
    </div>
  </section>

  <section class="inventory-preview">
    <div class="section-header">
      <h2>Current Collection</h2>
      <div class="line"></div>
    </div>

    <div class="carousel-container">
      <div class="carousel-track">
        
        <div class="slide">
          <img
            class="car-image"
            src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1200"
            alt="Silver Porsche 911 Performance"
          />
        </div>

        <div class="slide">
          <img
            class="car-image"
            src="https://images.unsplash.com/photo-1592198084033-aade902d1aae?auto=format&fit=crop&q=80&w=1200"
            alt="Red Ferrari Supercar"
          />
        </div>

        <div class="slide">
          <img
            class="car-image"
            src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&q=80&w=1200"
            alt="Lamborghini Huracan Profile"
          />
        </div>

        <div class="slide">
          <img
            class="car-image"
            src="https://rileymag.com/wp-content/uploads/2020/01/Mazzanti.jpg"

        <div class="slide">
