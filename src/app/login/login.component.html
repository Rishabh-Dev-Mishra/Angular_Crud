<div class="container">
  <div class="box">
    <h4 class="top-content">Login Here</h4>
    <div class="cred">
      <h5>Email Id</h5>
      <input type="email" name="email" id="" placeholder="email" [(ngModel)] = "email"/>
      <h5>Password</h5>
      <input
        type="password"
        name = "password"
        [(ngModel)] = "password"
        required="true"
        required
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
        title="Must contain at least one number, one uppercase, one lowercase letter, and one special character (!@#$%^&*), and be at least 8 characters long"
      placeholder="password"/>
    </div>
    <button type="button" (click)="login()">Login</button>
    <h6>Don't have an account? &nbsp; <a href="/register">Register here</a></h6>
  </div>
</div>
