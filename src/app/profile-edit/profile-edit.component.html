<div class="container">
  <!-- Toggle Buttons -->
  <div class="toggle-container">
    <button type="button" [class.active]="!showPasswordFields" (click)="showPasswordFields = false">
      Edit Profile
    </button>
    <button type="button" [class.active]="showPasswordFields" (click)="showPasswordFields = true">
      Change Password
    </button>
  </div>

  <div class="box">
    <h4 class="top-content">Edit Here</h4>
    <form class="forms" #editForm="ngForm" (ngSubmit)="editform(editForm)">
      
      <div class="cred" *ngIf="!showPasswordFields; else pass">
        <!-- 1. Profile Image Section -->
        <div class="profile-img-container" (click)="fileInput.click()">
          <!-- Uses the getter: shows preview if selected, else DB image -->
          <img [src]="imageURL" alt="Profile" class="profile-img" *ngIf="imageURL; else noImg" />
          <ng-template #noImg>
            <div class="placeholder-icon"><i class="fa fa-user"></i></div>
          </ng-template>
          <div class="overlay"><span>Change photo</span></div>
        </div>

        <!-- 2. Hidden File Input -->
        <input
          type="file"
          #fileInput
          (change)="onFileSelected($event)"
          style="display: none"
          accept="image/*"
        />

        <label for="firstname">Firstname</label>
        <input type="text" name="firstname" ngModel placeholder="Firstname" />
        
        <label for="lastname">Lastname</label>
        <input type="text" name="lastname" ngModel placeholder="Lastname" />
        
        <label for="email">Email</label>
        <input type="email" name="email" ngModel required placeholder="Email" />
      </div>

      <ng-template #pass>
        <div class="cred">
          <label for="email">Current Email</label>
          <input type="email" name="email" ngModel required />
          <label for="currentpassword">Current Password</label>
          <input type="password" name="currentpassword" ngModel required />
          <label for="newpassword">New Password</label>
          <input type="password" name="newpassword" ngModel required />
        </div>
      </ng-template>

      <button type="submit" [disabled]="editForm.invalid">Save Changes</button>
    </form>
  </div>
</div>
