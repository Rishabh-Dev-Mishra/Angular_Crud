<app-navbar></app-navbar>
<button (click)="goBack()" class="back-btn">
  <i class="fa fa-arrow-left"></i> Back
</button>

<div class="profile-page-wrapper">
  <div class="profile-card">
    <div class="card-header"></div>

    <div class="card-body">
      <div class="image-container">
        <img *ngIf="imageURL; else icons" [src]="imageURL" alt="Profile" />
        <ng-template #icons>
          <i class="fa fa-fw fa-user profile-icon"></i>
        </ng-template>
      </div>

      <h2 class="profile-name">{{name}}</h2>
      <p class="profile-email">{{email}}</p>

      <div class="info-section">
        <div class="info-row">
          <span class="label">{{name}}</span>
          <span class="value">&#64;{{name}}</span>
        </div>
        <div class="info-row">
          <span class="label">Status</span>
          <span class="val ue active">{{status}}</span>
        </div>
      </div>

      <button class="edit-btn" [routerLink]='["/edit-profile",user_id]'>Edit Profile</button>
    </div>
  </div>
</div>
