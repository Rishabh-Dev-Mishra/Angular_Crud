<div class="container">
    <div class="box">
        <h4 class="top-content">Register Here</h4>
        <div class="cred">
            <h5>First Name</h5>
            <input type="text" required = "true" [(ngModel)] = "firstname" placeholder="First name">

            <h5>Last Name</h5>
            <input type="text" required = "true" [(ngModel)] = "lastname" placeholder="Last name">

            <h5>Email Id</h5>
            <input type="email" required = "true" [(ngModel)] = "email" placeholder="Email">

            <h5>Password</h5>
            <input type="password" required = "true" [(ngModel)] = "password"
    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
    title="Must contain at least one number, one uppercase, one lowercase letter, and one special character (!@#$%^&*), and be at least 8 characters long" required ="true" placeholder="Password"/>
        </div>
        <button type = "button" (click)="register()">Register</button>
        <h6>Already have an account? <a href="/">Login</a></h6>
    </div>
</div>
